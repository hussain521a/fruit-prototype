<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Controller</title>
        <script src="/socket.io/socket.io.js"></script>
        <style>
            body{
                padding: 0;
                margin: 0;
            }
            roleDisplay{
                position: fixed;
                bottom:10px;
                right: 10px;
                background: #eee;
                color:white;
                padding: 5px 10px;
                border-radius: 5px;
                font-size: 14px;
                z-index: 1000;
            }
            #controls {
                margin-top: 20px;
            }
        </style>
    </head>
    <body>

        <h3>Join Room</h3>
        <input type="text" id="roomInput" placeholder="Room code">
        <button onclick="joinRoom()">Join</button>

        <div id="controls" style="display:none;">
            <button onclick="move(0,-5)">UP</button>
            <button onclick="move(0,5)">DOWN</button>
            <button onclick="move(-5,0)">LEFT</button>
            <button onclick="move(5,0)">RIGHT</button>
        </div>
        <div id="roleDisplay">
            Role: N/A
        </div>

        <script>
            const socket = io();
            let roomId;

            function joinRoom(){
                roomId = document.getElementById("roomInput").value;
                if(!roomId) return alert("Enter a room code");

                // For now, the first device to join as thief
                const role = "thief"; 

                socket.emit("joinRoom",{roomId, role});

                document.getElementById("controls").style.display = "block";
            }

            
            socket.on("assignRole",(role)=>{
                document.getElementById("roleDisplay").innerText = `Role: ${role}, Room: ${roomId}`;
            });


            function move(x,y){
            if(!roomId) return;
                socket.emit("move",{roomId, x, y});
            }
        </script>

    </body>
</html>
