<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Controller</title>
        <script src="/socket.io/socket.io.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
        <style>
            body{
                padding: 0;
                margin: 0;
            }
            #roleDisplay{
                position: fixed;
                bottom:10px;
                right: 10px;
                background: #eee;
                color:black;
                padding: 5px 10px;
                border-radius: 5px;
                font-size: 14px;
                z-index: 1000;
            }
            #controls {
                margin-top: 20px;
            }
            #joystick {
                width: 300px;
                height: 300px;
                margin-top: 20px;
                position: relative;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div id="roomJoin">
            <h3>Join Room</h3>
            <input type="text" id="roomInput" placeholder="Room code">
            <button onclick="joinRoom()">Join</button>
        </div>

        <div id="controls" style="display:none;">
            <button onclick="move(0,-5)">UP</button>
            <button onclick="move(0,5)">DOWN</button>
            <button onclick="move(-5,0)">LEFT</button>
            <button onclick="move(5,0)">RIGHT</button>

            <!-- Mobile - joystick -->
            <div id="joystick"></div>
        </div>
        <div id="roleDisplay">
            Role: N/A
        </div>

        <script>
            const socket = io();
            let roomId;
            const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

            // How often (ms) to re-emit the held joystick vector.
            // Lower = more responsive but more network traffic.
            const JOYSTICK_EMIT_INTERVAL = 50; // 20 times per second

            // Stores the current joystick vector while the stick is held.
            let joystickVector = { x: 0, y: 0 };
            let joystickInterval = null;


            function joinRoom(){
                roomId = document.getElementById("roomInput").value;
                if(!roomId) return alert("Enter a room code");

                socket.emit("joinRoom",{roomId, role:"controller"});

                document.getElementById("controls").style.display = "block";
                document.getElementById("roomJoin").style.display = "none";

                initJoystick();

                document.addEventListener("keydown", function(e){
                    const speed = 5;
                    switch(e.key){
                        case "ArrowUp":
                        case "w":
                            move(0,-speed);
                            break;
                        case "ArrowDown":
                        case "s":
                            move(0,speed);
                            break;
                        case "ArrowLeft":
                        case "a":
                            move(-speed,0);
                            break;
                        case "ArrowRight":
                        case "d":
                            move(speed,0);
                            break;
                    }
                });
            }

            socket.on("assignRole",(role)=>{
                document.getElementById("roleDisplay").innerText = `Role: ${role}, Room: ${roomId}`;
            });

            function move(x,y){
                if(!roomId) return;
                socket.emit("move",{roomId, x, y});
            }

            function initJoystick(){
                const joystick = nipplejs.create({
                    zone: document.getElementById("joystick"),
                    mode: "static",
                    position: {left: "50%", top: "50%"},
                    color: "blue",
                    size: 150
                });

                joystick.on("move", (evt, data)=>{
                    if(!data) return;

                    // Update the stored vector — the interval loop keeps emitting it
                    joystickVector.x = Math.round(data.vector.x * 5);
                    joystickVector.y = -1 * (Math.round(data.vector.y * 5));

                    // Start the emission loop if it isn't already running
                    if(!joystickInterval){
                        joystickInterval = setInterval(()=>{
                            move(joystickVector.x, joystickVector.y);
                        }, JOYSTICK_EMIT_INTERVAL);
                    }
                });

                // When the stick is released, stop emitting
                joystick.on("end", ()=>{
                    joystickVector = { x: 0, y: 0 };
                    if(joystickInterval){
                        clearInterval(joystickInterval);
                        joystickInterval = null;
                    }
                });
            }

        </script>

    </body>
</html>
